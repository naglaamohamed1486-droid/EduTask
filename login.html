    <h1>Welcome to the Login Page</h1>
    <p>In this page you can login to your account</p>

    <form >

        <div class="Form">
            <label for="username">Username:</label><br>
            <input 
                id="username"  name="username" type="text"   placeholder="Enter username"  required >
        </div>

        <br>

        <div class="input1">
            <label for="email">Email:</label><br>
            <input 
                id="email" name="email" type="email"  placeholder="Enter your email"  required>
        </div>

        <br>

        <div class="input2">
            <label for="password">Password:</label><br>
            <input 
                id="password" name="password"type="password" placeholder="Enter your password" minlength="6" required >
        </div>

        <br>

        <div class="input3">
            <label for="role">Role:</label><br>
            <select id="role" name="role" required>
                <option value="">Select role</option>
                <option value="admin">Company Admin</option>
                <option value="User">User</option>
            </select>
        </div>

        <br>

        <button type="submit">Login</button>
<button type="reset">Clear</button>
    </form>

    <p>
        Don't have an account?
